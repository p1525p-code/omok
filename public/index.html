<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>다수결 오목 게임 (렌주룰 적용)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 기본 레이아웃 스타일 */
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        #status { font-size: 1.5rem; font-weight: bold; margin: 20px; padding: 10px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 오목판 스타일 */
        #board { display: grid; grid-template-columns: repeat(15, 30px); grid-template-rows: repeat(15, 30px); gap: 1px; background-color: #dcb35c; padding: 10px; border: 2px solid #8b5a2b; }
        .cell { width: 30px; height: 30px; background-color: #dcb35c; border: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        
        /* 바둑알 스타일 */
        .stone { width: 26px; height: 26px; border-radius: 50%; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .black { background-color: #000; }
        .white { background-color: #fff; }

        /* 컨트롤 패널 및 버튼 */
        #controls { margin-top: 20px; display: none; } /* 기본적으로 숨김 (선생님만 보임) */
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #4a90e2; color: white; transition: 0.3s; }
        button:hover { background: #357abd; }
        #bgm-btn { background: #555; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="status">서버 연결 중...</div>
    
    <div id="board"></div>

    <div id="controls">
        <button id="reset-btn">🔄 게임 초기화</button>
        <button id="bgm-btn">🎵 배경음 켜기</button>
    </div>

    <script>
        // 1. [외부 서버 접속 및 선생님 권한 설정]
        // 주소창의 ?admin=비밀번호를 읽어옵니다.
        const urlParams = new URLSearchParams(window.location.search);
        const adminKey = urlParams.get('admin');

        // 서버에 접속할 때 비밀번호 정보를 함께 보냅니다.
        const socket = io({
            query: { admin: adminKey }
        });

        // 2. [사운드 파일 설정]
        // public/sounds 폴더에 mp3 파일이 있어야 작동합니다.
        const bgm = new Audio('/sounds/bgm.mp3');
        bgm.loop = true; // 배경음악 무한 반복
        const stoneSound = new Audio('/sounds/stone.mp3');
        const turnSound = new Audio('/sounds/turn.mp3');
        let isBgmPlaying = false;

        const boardDiv = document.getElementById('board');
        const statusDiv = document.getElementById('status');
        const controlsDiv = document.getElementById('controls');
        const bgmBtn = document.getElementById('bgm-btn');

        let currentRole = 'student'; // 기본값은 학생
        let myTurn = false;

        // 3. [선생님/학생 역할 확정]
        socket.on('roleConfirmed', (role) => {
            currentRole = role;
            if (role === 'teacher') {
                statusDiv.innerText = "👨‍🏫 선생님으로 접속되었습니다.";
                controlsDiv.style.display = 'block'; // 선생님에게만 관리자 버튼 표시
            } else {
                statusDiv.innerText = "🧑‍🎓 학생으로 접속되었습니다. (백돌)";
            }
        });

        // 4. [오목판 그리기 및 클릭 이벤트]
        socket.on('updateBoard', (board) => {
            // 보드가 업데이트될 때마다 착수음 재생
            stoneSound.currentTime = 0;
            stoneSound.play().catch(e => {});

            boardDiv.innerHTML = '';
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // 돌이 놓여있는 경우 표시
                    if (board[r][c] === 1) {
                        const stone = document.createElement('div');
                        stone.className = 'stone black';
                        cell.appendChild(stone);
                    } else if (board[r][c] === 2) {
                        const stone = document.createElement('div');
                        stone.className = 'stone white';
                        cell.appendChild(stone);
                    }

                    // 클릭 시 서버로 좌표 전송
                    cell.addEventListener('click', () => {
                        if (currentRole === 'teacher') {
                            socket.emit('teacherMove', { row: r, col: c });
                        } else {
                            socket.emit('studentVote', { row: r, col: c });
                        }
                    });
                    boardDiv.appendChild(cell);
                }
            }
        });

        // 5. [턴 변경 알림 및 소리]
        socket.on('turnChange', (turn) => {
            const isTeacherTurn = (turn === 1);
            
            if (isTeacherTurn) {
                statusDiv.innerText = "현재 차례: 흑돌 (선생님)";
                if (currentRole === 'teacher') {
                    myTurn = true;
                    turnSound.play().catch(e => {}); // 내 차례가 되면 알림음
                }
            } else {
                statusDiv.innerText = "현재 차례: 백돌 (학생 다수결 투표 중...)";
                if (currentRole === 'student') {
                    myTurn = true;
                    turnSound.play().catch(e => {}); // 학생 차례가 되면 알림음
                }
            }
        });

        // 6. [렌주룰 금수 경고]
        socket.on('invalidMove', (message) => {
            alert(message); // 서버에서 보낸 "3-3 금수" 등의 메시지를 띄움
        });

        // 7. [게임 종료]
        socket.on('gameOver', (winner) => {
            if (winner === 'teacher') {
                alert("게임 종료! 선생님(흑돌) 승리!");
            } else {
                alert("게임 종료! 학생들(백돌) 승리!");
            }
        });

        // 8. [배경음악 제어]
        bgmBtn.addEventListener('click', () => {
            if (!isBgmPlaying) {
                bgm.play().catch(e => alert("음악 재생을 위해 화면을 먼저 클릭해주세요!"));
                bgmBtn.innerText = "🔇 배경음 끄기";
                isBgmPlaying = true;
            } else {
                bgm.pause();
                bgmBtn.innerText = "🎵 배경음 켜기";
                isBgmPlaying = false;
            }
        });

        // 초기화 버튼 이벤트
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm("게임을 초기화하시겠습니까?")) {
                socket.emit('resetGame');
            }
        });

    </script>
</body>
</html>
